name: release

on:
  push:
    tags: ['v*.*.*']

permissions:
  contents: write
  packages: write

jobs:
  release:
    name: release
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Validate tag format (strict SemVer)
        run: |
          if [[ ! "${GITHUB_REF_NAME}" =~ ^v[0-9]+\.[0-9]+\.[0-9]+(-[0-9A-Za-z.-]+)?$ ]]; then
            echo "::error::Tag ${GITHUB_REF_NAME} is not strict SemVer (vMAJOR.MINOR.PATCH[-prerelease])."
            exit 1
          fi

      - name: Extract tag version
        id: ver
        run: echo "version=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - name: Verify CHANGELOG has matching section
        env:
          VERSION: ${{ steps.ver.outputs.version }}
        run: |
          if ! grep -E "^## \[${VERSION}\]" CHANGELOG.md > /dev/null; then
            echo "::error::CHANGELOG.md is missing a [${VERSION}] section."
            exit 1
          fi

      - uses: actions/setup-dotnet@v4
        with:
          global-json-file: global.json

      - uses: actions/cache@v4
        with:
          path: ~/.nuget/packages
          key: nuget-${{ runner.os }}-${{ hashFiles('**/*.csproj','Directory.Packages.props') }}
          restore-keys: |
            nuget-${{ runner.os }}-

      - run: dotnet tool restore
      - run: dotnet cake --target=Test --configuration=Release

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build & push image to GHCR
        uses: docker/build-push-action@v6
        with:
          context: .
          file: src/Heimdall.Api/Dockerfile
          push: true
          tags: |
            ghcr.io/markeli/heimdall:${{ steps.ver.outputs.version }}
            ghcr.io/markeli/heimdall:latest

      - name: Extract release notes from CHANGELOG
        env:
          VERSION: ${{ steps.ver.outputs.version }}
        run: |
          awk -v v="$VERSION" '
            $0 ~ "^## \\["v"\\]" {f=1; next}
            f && /^## \[/ {exit}
            f && /^\[[^]]+\]: / {exit}
            f {print}
          ' CHANGELOG.md > release-notes.md
          if [ ! -s release-notes.md ]; then
            echo "::error::Extracted release notes for ${VERSION} are empty."
            exit 1
          fi

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: v${{ steps.ver.outputs.version }}
          body_path: release-notes.md
