name: ci

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  build:
    name: build + test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-dotnet@v4
        with:
          global-json-file: global.json

      - uses: actions/cache@v4
        with:
          path: ~/.nuget/packages
          key: nuget-${{ runner.os }}-${{ hashFiles('**/*.csproj','Directory.Packages.props') }}
          restore-keys: |
            nuget-${{ runner.os }}-

      - run: dotnet tool restore
      - run: dotnet cake --target=Test --configuration=Release

  changelog-guard:
    name: changelog updated
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Require CHANGELOG update (unless 'skip-changelog' label)
        if: ${{ !contains(github.event.pull_request.labels.*.name, 'skip-changelog') }}
        env:
          BASE_SHA: ${{ github.event.pull_request.base.sha }}
          HEAD_SHA: ${{ github.event.pull_request.head.sha }}
        run: |
          if ! git diff --name-only "$BASE_SHA" "$HEAD_SHA" | grep -q '^CHANGELOG\.md$'; then
            echo "::error::PRs must add an entry under [Unreleased] in CHANGELOG.md or carry the 'skip-changelog' label."
            exit 1
          fi
